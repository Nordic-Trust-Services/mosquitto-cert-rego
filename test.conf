# Example mosquitto.conf fragment for the cert-rego plugin.
#
# Flow:
#   1. TLS handshake: broker validates the client cert chain against `cafile`.
#   2. Plugin builds and re-verifies the chain against its own trust store
#      (which may span multiple roots — see cert_rego_ca_file below) and
#      records which root the chain anchored to.
#   3. Plugin evaluates the Rego policy. Allow/deny is the policy's output.
#      Policies may call out to LDAP, HTTP (OAuth2 introspection), or
#      anything else rego-cpp exposes.
#   4. On allow + ocsp_enabled: plugin walks the chain for OCSP.
#
# Passwordless: this plugin never looks at the MQTT CONNECT password.
# Authentication is cert + policy. The CONNECT username is surfaced to
# the policy as input.connect.username for whatever purpose.

per_listener_settings true

listener 8883
cafile   /etc/mosquitto/ca/bundle_all.pem
certfile /etc/mosquitto/server/server.crt
keyfile  /etc/mosquitto/server/server.key
require_certificate true
# Let the plugin decide identity. Do not set use_identity_as_username.
use_identity_as_username false

plugin /usr/local/lib/mosquitto/mosquitto_cert_rego.so

# ---- trust store ---------------------------------------------------------

# Comma-separated list of PEM bundles, all loaded into a single X509_STORE.
# Multi-root deployments list every root (+ its intermediates) here. The
# plugin passes the anchor to Rego as input.cert.trust_anchor so policies
# can dispatch on which root the chain validated against.
#
# Single root: just pass one path.
#   plugin_opt_cert_rego_ca_file /etc/mosquitto/ca/bundle.pem
#
# Multiple roots:
plugin_opt_cert_rego_ca_file /etc/mosquitto/ca/bundle_a.pem,/etc/mosquitto/ca/bundle_b.pem

# Optional: a hashed-CA directory loaded alongside the ca_file list.
# plugin_opt_cert_rego_ca_path /etc/mosquitto/ca/trusted.d

# ---- Rego policy ---------------------------------------------------------

plugin_opt_cert_rego_policy_file        /etc/mosquitto/policies/access.rego
plugin_opt_cert_rego_connect_entrypoint data.mqtt.connect
plugin_opt_cert_rego_acl_entrypoint     data.mqtt.acl

# ---- LDAP (optional, passwordless) ---------------------------------------

# Whitelist of LDAP URLs that policies may call ldap.search / exists /
# is_member against. Policies that try anything else get an error, which
# under fail-closed evaluates to deny. Leave empty to run without LDAP.
plugin_opt_cert_rego_ldap_allowed_urls ldaps://ldap.example.com

# Forbid plain ldap:// — defence in depth for the URL whitelist.
plugin_opt_cert_rego_ldap_require_tls true

# CA bundle the plugin uses to verify the LDAP server certificate.
plugin_opt_cert_rego_ldap_ca_file /etc/mosquitto/ca/ldap-server-ca.pem

plugin_opt_cert_rego_ldap_connect_timeout_ms 3000
plugin_opt_cert_rego_ldap_op_timeout_ms      5000

# In-memory cache TTL for ldap.search / exists / is_member results, in
# seconds. Zero disables caching.
plugin_opt_cert_rego_ldap_cache_ttl 60

# ---- Audit log -----------------------------------------------------------
#
# Two independent sinks, both speaking the same JSON-line format:
#
#   * file sink: append-only file. Best with logrotate copytruncate.
#   * syslog sink: openlog/syslog(3). Forwarded by rsyslog/journald to a SIEM.
#
# Either or both can be enabled. The level filter applies to both sinks
# uniformly so file and syslog stay in step.

# File sink. Empty disables.
plugin_opt_cert_rego_audit_log_file /var/log/mosquitto/cert-rego-audit.log
plugin_opt_cert_rego_audit_log_fsync false

# Syslog sink. ident appears in syslog as the program tag; facility is
# routed by the syslog daemon's config (rsyslog/syslog-ng/journald).
plugin_opt_cert_rego_audit_syslog_enabled false
plugin_opt_cert_rego_audit_syslog_ident   mosquitto-cert-rego
plugin_opt_cert_rego_audit_syslog_facility authpriv
# accepted: auth, authpriv, daemon, user, local0..local7

# Threshold filter. Events above this level are dropped before formatting.
#   error   — internal plugin / sink failures only
#   warn    — + verify_error denies, sink-write errors
#   notice  — + plugin lifecycle, deny decisions (deny-only production)
#   info    — + allow decisions with full cert metadata (default; right
#             setting under a relaxed policy)
#   debug   — + per-cert chain dump, SAN, custom OIDs, eval timing,
#             policy-emitted audit.log() notes
plugin_opt_cert_rego_audit_level info

# Hard cap on a single audit line, in bytes. Lines that would exceed the cap
# are rebuilt as a minimal line with "truncated":true. Clamp 1024..16384.
plugin_opt_cert_rego_audit_line_cap 4096

# DEBUG-only granular toggles. Only consulted when audit_level=debug.
# Off by default — even in debug, you need to opt in to the heavy fields.
plugin_opt_cert_rego_audit_chain_detail   false
plugin_opt_cert_rego_audit_chain_max_depth 8     # truncated to N entries
plugin_opt_cert_rego_audit_san            false
plugin_opt_cert_rego_audit_custom_oids    false
plugin_opt_cert_rego_audit_eval_timing    false  # adds eval_us per decision

# ---- ACL payload ---------------------------------------------------------

# Set true to expose publish payloads (base64) at input.acl.payload_b64.
# Off by default — adds base64 + JSON marshal to every publish.
plugin_opt_cert_rego_acl_include_payload false

# ---- OCSP implementation knobs -------------------------------------------
#
# OCSP is a Rego host function — policies call ocsp.check() to decide. The
# plugin has no "enabled" or "mode" option: whether to query, which certs
# to inspect, and how strict to be about indeterminate outcomes is all
# policy logic. See examples/05_ocsp_in_rego.rego.
#
# These options only govern HOW the plugin talks to responders when a
# policy asks it to.

plugin_opt_cert_rego_ocsp_timeout_ms 3000
plugin_opt_cert_rego_ocsp_min_refresh 86400
plugin_opt_cert_rego_ocsp_require_signing_eku true

# ---- CRL fetching (opt-in, driven by Rego) ------------------------------
#
# CRLs are fetched on demand when a Rego policy calls crl.check(). URLs
# come from the cert's crlDistributionPoints extension. Each fetched CRL
# is cached in memory by URL for crl_fetch_cache_ttl seconds (or until
# its nextUpdate, whichever comes first) so repeated connects don't
# re-download the same file.
#
# Off by default. Enable when the policy needs CRL signalling alongside
# or instead of ocsp.check().

plugin_opt_cert_rego_crl_fetch_enabled false

# Per-request timeout (milliseconds).
plugin_opt_cert_rego_crl_fetch_timeout_ms 5000

# Response size cap. CRLs can be large; the clamp is 1 KB – 16 MB.
plugin_opt_cert_rego_crl_fetch_max_size 1048576

# In-memory TTL (seconds). Effective cache life is
# min(crl_fetch_cache_ttl, CRL's own nextUpdate).
plugin_opt_cert_rego_crl_fetch_cache_ttl 3600

# ---- AIA fetching (opt-in) ----------------------------------------------
#
# When a client presents a leaf that doesn't chain to anything in the
# trust store — typically because the issuing intermediate is missing —
# the plugin can download the caIssuers URL from the leaf's AIA extension
# and retry the chain build.
#
# Off by default: fetching URLs embedded in client certs is an SSRF-shaped
# risk surface. Turn it on only for PKIs that publish caIssuers URLs you
# already implicitly trust.

plugin_opt_cert_rego_aia_fetch_enabled false

# Per-request timeout (milliseconds) for the HTTP GET.
plugin_opt_cert_rego_aia_fetch_timeout_ms 3000

# Max number of intermediates to chase up the AIA chain. Default 4.
plugin_opt_cert_rego_aia_fetch_max_depth 4

# Hard cap on response size in bytes. Cap clamps between 1 KB and 1 MB.
plugin_opt_cert_rego_aia_fetch_max_size 65536

# In-memory TTL (seconds) for the URL→cert cache. A fetched CA cert is
# reused across this many seconds of traffic before we refetch.
plugin_opt_cert_rego_aia_fetch_cache_ttl 86400
