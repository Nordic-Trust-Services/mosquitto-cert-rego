# e2e test broker config for cert-rego.
#
# Listens on 18883/mTLS only, drops everything to ./e2e/run/.
# Loads the freshly-built plugin from /tmp/cert-rego-build/.

listener 18883
listener_allow_anonymous false
cafile __E2E_DIR__/pki/bundle_all.pem
certfile __E2E_DIR__/pki/server.crt
keyfile __E2E_DIR__/pki/server.key
require_certificate true
use_identity_as_username false

# Broker logging — separate from the plugin's audit log.
log_dest file __E2E_DIR__/run/broker.log
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Persist nothing between runs.
persistence false

# ---- plugin ----------------------------------------------------------------

plugin __PLUGIN_SO__
plugin_opt_cert_rego_ca_file __E2E_DIR__/pki/bundle_a.pem,__E2E_DIR__/pki/bundle_b.pem
plugin_opt_cert_rego_policy_file __E2E_DIR__/policy.rego

# Audit: file + DEBUG so the cybersec test scripts can assert on extras.
plugin_opt_cert_rego_audit_log_file __E2E_DIR__/run/audit.jsonl
plugin_opt_cert_rego_audit_log_fsync true
plugin_opt_cert_rego_audit_level debug
plugin_opt_cert_rego_audit_chain_detail true
plugin_opt_cert_rego_audit_chain_max_depth 4
plugin_opt_cert_rego_audit_san true
plugin_opt_cert_rego_audit_eval_timing true
plugin_opt_cert_rego_audit_line_cap 8192

# Syslog: off in e2e (one less moving part). Flip to true to mirror.
plugin_opt_cert_rego_audit_syslog_enabled false
